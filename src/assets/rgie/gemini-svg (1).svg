<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" background-color="#fff">
  <style>
    .label { font-family: Arial, sans-serif; font-size: 10px; fill: #555; text-anchor: middle; }
    .symbol { stroke: black; stroke-width: 1.5; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .arch { stroke: #666; stroke-width: 1; fill: none; }
    .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #000; }
  </style>

  <text x="400" y="30" class="title" text-anchor="middle">Bibliothèque Symboles RGIE 2026 &amp; Architecture</text>

  <g transform="translate(50, 80)">
    <text x="150" y="-20" class="title" style="font-size: 12px;">Interrupteurs</text>
    
    <g id="int_unipolaire" transform="translate(0,0)">
      <circle cx="20" cy="20" r="8" class="symbol"/>
      <line x1="20" y1="12" x2="28" y2="4" class="symbol"/>
      <text x="20" y="45" class="label">Unipolaire</text>
    </g>

    <g id="int_bipolaire" transform="translate(80,0)">
      <circle cx="20" cy="20" r="8" class="symbol"/>
      <line x1="20" y1="12" x2="28" y2="4" class="symbol"/>
      <line x1="17" y1="11" x2="25" y2="3" class="symbol"/>
      <text x="20" y="45" class="label">Bipolaire</text>
    </g>

    <g id="int_vaevient" transform="translate(160,0)">
      <circle cx="20" cy="20" r="8" class="symbol"/>
      <line x1="20" y1="12" x2="28" y2="4" class="symbol"/>
      <line x1="20" y1="28" x2="12" y2="36" class="symbol"/>
      <text x="20" y="45" class="label">Va-et-vient</text>
    </g>

    <g id="int_inverseur" transform="translate(240,0)">
      <circle cx="20" cy="20" r="8" class="symbol"/>
      <line x1="20" y1="12" x2="28" y2="4" class="symbol"/>
      <line x1="20" y1="28" x2="12" y2="36" class="symbol"/>
      <line x1="13" y1="17" x2="5" y2="23" class="symbol"/>
      <line x1="27" y1="23" x2="35" y2="17" class="symbol"/>
      <text x="20" y="45" class="label">Inverseur</text>
    </g>

    <g id="bouton_poussoir" transform="translate(320,0)">
      <circle cx="20" cy="20" r="8" class="symbol"/>
      <circle cx="20" cy="20" r="2" fill="black"/>
      <line x1="20" y1="12" x2="28" y2="4" class="symbol"/>
      <text x="20" y="45" class="label">Poussoir</text>
    </g>
  </g>

  <g transform="translate(50, 180)">
    <text x="150" y="-20" class="title" style="font-size: 12px;">Prises de courant</text>

    <g id="prise_terre" transform="translate(0,0)">
      <path d="M 5,20 A 15,15 0 0 1 35,20" class="symbol"/>
      <line x1="5" y1="20" x2="35" y2="20" class="symbol"/>
      <line x1="20" y1="20" x2="20" y2="5" class="symbol"/>
      <text x="20" y="45" class="label">Simple + T</text>
    </g>

    <g id="prise_double" transform="translate(80,0)">
      <path d="M 5,20 A 15,15 0 0 1 35,20" class="symbol"/>
      <line x1="5" y1="20" x2="35" y2="20" class="symbol"/>
      <line x1="20" y1="20" x2="20" y2="5" class="symbol"/>
      <text x="20" y="40" class="label" style="font-weight:bold">2</text>
      <text x="20" y="55" class="label">Double</text>
    </g>

    <g id="prise_etanche" transform="translate(160,0)">
      <rect x="2" y="5" width="36" height="30" class="symbol" stroke-dasharray="2,1"/>
      <path d="M 10,25 A 10,10 0 0 1 30,25" class="symbol"/>
      <line x1="20" y1="25" x2="20" y2="15" class="symbol"/>
      <text x="20" y="50" class="label">Étanche</text>
    </g>

    <g id="prise_3p" transform="translate(240,0)">
      <path d="M 5,20 A 15,15 0 0 1 35,20" class="symbol"/>
      <line x1="20" y1="20" x2="20" y2="5" class="symbol"/>
      <line x1="17" y1="10" x2="23" y2="10" class="symbol"/>
      <text x="20" y="45" class="label">3P+N+T</text>
    </g>
  </g>

  <g transform="translate(50, 280)">
    <text x="150" y="-20" class="title" style="font-size: 12px;">Éclairage &amp; Sécurité</text>
    
    <g id="lum_plafond" transform="translate(0,0)">
      <line x1="10" y1="10" x2="30" y2="30" class="symbol"/>
      <line x1="30" y1="10" x2="10" y2="30" class="symbol"/>
      <text x="20" y="45" class="label">Plafonnier</text>
    </g>

    <g id="lum_applique" transform="translate(80,0)">
      <line x1="10" y1="10" x2="30" y2="30" class="symbol"/>
      <line x1="30" y1="10" x2="10" y2="30" class="symbol"/>
      <line x1="10" y1="10" x2="10" y2="30" class="symbol"/>
      <text x="20" y="45" class="label">Applique</text>
    </g>

    <g id="smoke_detector" transform="translate(160,0)">
      <circle cx="20" cy="20" r="15" class="symbol"/>
      <path d="M 15,15 Q 20,10 25,15 T 25,25" class="symbol" />
      <text x="20" y="45" class="label">Fumée</text>
    </g>

    <g id="ev_charging" transform="translate(240,0)">
      <rect x="10" y="5" width="20" height="30" class="symbol"/>
      <text x="20" y="25" class="label" style="font-weight:bold; font-size:8px;">EV</text>
      <text x="20" y="50" class="label">Bornier EV</text>
    </g>
  </g>

  <g transform="translate(50, 380)">
    <text x="150" y="-20" class="title" style="font-size: 12px;">Tableau &amp; Comptage</text>

    <g id="coffret" transform="translate(0,0)">
      <rect x="0" y="0" width="50" height="30" class="symbol"/>
      <line x1="12" y1="0" x2="12" y2="30" class="symbol"/>
      <line x1="25" y1="0" x2="25" y2="30" class="symbol"/>
      <line x1="37" y1="0" x2="37" y2="30" class="symbol"/>
      <text x="25" y="45" class="label">Coffret</text>
    </g>

    <g id="differentiel" transform="translate(80,0)">
      <circle cx="20" cy="20" r="12" class="symbol"/>
      <path d="M 20,8 A 6,6 0 0 1 20,20" class="symbol" fill="none"/>
      <line x1="20" y1="20" x2="20" y2="32" class="symbol"/>
      <text x="20" y="45" class="label">Différentiel</text>
    </g>

    <g id="compteur" transform="translate(160,0)">
      <rect x="5" y="5" width="35" height="25" class="symbol"/>
      <text x="22" y="22" style="font-size:8px; font-weight:bold;">kWh</text>
      <text x="22" y="45" class="label">Compteur</text>
    </g>
  </g>

  <g transform="translate(50, 500)">
    <text x="150" y="-20" class="title" style="font-size: 12px; fill: #666;">Aménagements (Architecture)</text>

    <g id="arch_wc" transform="translate(0,0)">
      <rect x="10" y="0" width="20" height="10" class="arch" />
      <path d="M 5,12 Q 5,35 20,35 Q 35,35 35,12 Z" class="arch" />
      <text x="20" y="50" class="label">WC</text>
    </g>

    <g id="arch_evier" transform="translate(80,0)">
      <rect x="0" y="0" width="40" height="35" class="arch" />
      <rect x="5" y="5" width="30" height="25" rx="2" class="arch" />
      <circle cx="20" cy="17" r="2" class="arch" />
      <text x="20" y="50" class="label">Évier</text>
    </g>

    <g id="arch_escalier" transform="translate(160,0)">
      <rect x="0" y="0" width="35" height="60" class="arch" />
      <line x1="0" y1="10" x2="35" y2="10" class="arch" />
      <line x1="0" y1="20" x2="35" y2="20" class="arch" />
      <line x1="0" y1="30" x2="35" y2="30" class="arch" />
      <line x1="0" y1="40" x2="35" y2="40" class="arch" />
      <line x1="0" y1="50" x2="35" y2="50" class="arch" />
      <path d="M 17,55 L 17,10 L 12,20 M 17,10 L 22,20" class="arch" stroke-width="0.5"/>
      <text x="17" y="75" class="label">Escalier</text>
    </g>

    <g id="arch_porte" transform="translate(260,0)">
      <line x1="0" y1="0" x2="0" y2="40" stroke="black" stroke-width="2"/>
      <path d="M 0,40 A 40,40 0 0 1 40,0" stroke="#ccc" fill="none" stroke-dasharray="2,2"/>
      <line x1="0" y1="0" x2="40" y2="0" class="arch" />
      <text x="20" y="55" class="label">Porte</text>
    </g>
    
    <g id="arch_fenetre" transform="translate(340,0)">
      <rect x="0" y="15" width="50" height="6" class="arch" />
      <line x1="0" y1="18" x2="50" y2="18" class="arch" />
      <text x="25" y="40" class="label">Fenêtre</text>
    </g>
  </g>

  <g transform="translate(50, 650)">
    <g id="app_washing" transform="translate(0,0)">
      <rect x="0" y="0" width="40" height="40" class="symbol" />
      <circle cx="20" cy="22" r="12" class="symbol" />
      <text x="20" y="55" class="label">Lave-Linge</text>
    </g>
    <g id="app_oven" transform="translate(80,0)">
      <rect x="0" y="0" width="40" height="40" class="symbol" />
      <rect x="5" y="8" width="30" height="20" class="symbol" />
      <line x1="5" y1="5" x2="35" y2="5" class="symbol" />
      <text x="20" y="55" class="label">Four</text>
    </g>
  </g>

</svg>
