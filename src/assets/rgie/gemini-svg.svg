<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1600" background-color="#fff">
  <style>
    .label { font-family: 'Segoe UI', Arial, sans-serif; font-size: 9px; fill: #333; text-anchor: middle; }
    .symbol { stroke: black; stroke-width: 1.2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .arch { stroke: #888; stroke-width: 1; fill: none; }
    .section-title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; text-decoration: underline; }
  </style>

  <g transform="translate(50, 50)">
    <text x="0" y="-15" class="section-title">A. Nature des courants</text>
    <g id="courant_continu" transform="translate(0,0)">
        <line x1="0" y1="10" x2="30" y2="10" class="symbol"/>
        <line x1="0" y1="15" x2="30" y2="15" class="symbol" stroke-dasharray="4,2"/>
        <text x="15" y="35" class="label">CC (DC)</text>
    </g>
    <g id="courant_alternatif" transform="translate(70,0)">
        <path d="M 0,12 Q 7.5,2 15,12 T 30,12" class="symbol"/>
        <text x="15" y="35" class="label">CA (AC)</text>
    </g>
    <g id="ac_monophase" transform="translate(140,0)">
        <path d="M 0,12 Q 7.5,2 15,12 T 30,12" class="symbol"/>
        <text x="15" y="5" class="label" style="font-weight:bold">1~</text>
        <text x="15" y="35" class="label">AC Mono</text>
    </g>
    <g id="ac_triphase" transform="translate(210,0)">
        <path d="M 0,12 Q 7.5,2 15,12 T 30,12" class="symbol"/>
        <text x="15" y="5" class="label" style="font-weight:bold">3~</text>
        <text x="15" y="35" class="label">AC Tri</text>
    </g>
  </g>

  <g transform="translate(50, 150)">
    <text x="0" y="-15" class="section-title">B &amp; C. Tableaux et Canalisations</text>
    <g id="tableau_general" transform="translate(0,0)">
        <rect x="0" y="0" width="40" height="25" class="symbol" fill="#eee"/>
        <line x1="10" y1="0" x2="10" y2="25" class="symbol"/>
        <text x="20" y="40" class="label">Tableau</text>
    </g>
    <g id="boite_derivation" transform="translate(80,0)">
        <circle cx="15" cy="12" r="10" class="symbol"/>
        <line x1="5" y1="12" x2="25" y2="12" class="symbol"/>
        <line x1="15" y1="2" x2="15" y2="22" class="symbol"/>
        <text x="15" y="40" class="label">Dérivation</text>
    </g>
    <g id="sectionneur_terre" transform="translate(160,0)">
        <line x1="0" y1="20" x2="30" y2="20" class="symbol"/>
        <line x1="5" y1="20" x2="15" y2="5" class="symbol"/>
        <circle cx="15" cy="5" r="2" fill="black"/>
        <text x="15" y="40" class="label">Sect. Terre</text>
    </g>
    <g id="can_encastree" transform="translate(240,15)">
        <line x1="0" y1="0" x2="40" y2="0" class="symbol" stroke-dasharray="4,2"/>
        <text x="20" y="25" class="label">Encastré</text>
    </g>
    <g id="terre" transform="translate(320,0)">
        <line x1="15" y1="0" x2="15" y2="20" class="symbol"/>
        <line x1="0" y1="20" x2="30" y2="20" class="symbol"/>
        <line x1="5" y1="25" x2="25" y2="25" class="symbol"/>
        <line x1="10" y1="30" x2="20" y2="30" class="symbol"/>
        <text x="15" y="45" class="label">Terre</text>
    </g>
  </g>

  <g transform="translate(50, 300)">
    <text x="0" y="-15" class="section-title">E. Interrupteurs et Commandes</text>
    <g id="int_temoin" transform="translate(0,0)">
        <circle cx="15" cy="20" r="8" class="symbol"/>
        <line x1="15" y1="12" x2="23" y2="4" class="symbol"/>
        <circle cx="15" cy="20" r="2" fill="black"/>
        <text x="15" y="45" class="label">Témoin</text>
    </g>
    <g id="int_tripolaire" transform="translate(80,0)">
        <circle cx="15" cy="20" r="8" class="symbol"/>
        <line x1="15" y1="12" x2="23" y2="4" class="symbol"/>
        <line x1="12" y1="11" x2="20" y2="3" class="symbol"/>
        <line x1="18" y1="13" x2="26" y2="5" class="symbol"/>
        <text x="15" y="45" class="label">Tripolaire</text>
    </g>
    <g id="int_dimmer" transform="translate(160,0)">
        <circle cx="15" cy="20" r="8" class="symbol"/>
        <line x1="5" y1="28" x2="25" y2="12" class="symbol"/>
        <line x1="20" y1="12" x2="25" y2="12" y2="17" class="symbol"/>
        <text x="15" y="45" class="label">Gradateur</text>
    </g>
    <g id="detecteur_mouv" transform="translate(240,0)">
        <rect x="0" y="5" width="30" height="30" class="symbol"/>
        <path d="M 5,35 A 15,15 0 0 1 25,35" class="symbol"/>
        <text x="15" y="25" class="label" style="font-size:7px">IR</text>
        <text x="15" y="50" class="label">Mouvement</text>
    </g>
    <g id="telerupteur" transform="translate(320,0)">
        <rect x="0" y="5" width="30" height="30" class="symbol"/>
        <line x1="5" y1="35" x2="25" y2="5" class="symbol"/>
        <line x1="5" y1="5" x2="10" y2="5" class="symbol"/>
        <text x="15" y="50" class="label">Télérupteur</text>
    </g>
  </g>

  <g transform="translate(50, 450)">
    <text x="0" y="-15" class="section-title">F. Socles de Prise de Courant</text>
    <g id="prise_enfant" transform="translate(0,0)">
        <path d="M 0,20 A 15,15 0 0 1 30,20" class="symbol"/>
        <line x1="0" y1="20" x2="30" y2="20" class="symbol"/>
        <circle cx="15" cy="14" r="2" fill="black"/>
        <text x="15" y="40" class="label">Enfant</text>
    </g>
    <g id="prise_rasoir" transform="translate(80,0)">
        <rect x="-5" y="-5" width="40" height="40" class="symbol" stroke-width="0.5"/>
        <path d="M 0,20 A 15,15 0 0 1 30,20" class="symbol"/>
        <text x="15" y="15" class="label" style="font-size:7px">TR</text>
        <text x="15" y="45" class="label">Rasoir</text>
    </g>
    <g id="prise_data" transform="translate(160,0)">
        <rect x="0" y="5" width="30" height="25" class="symbol"/>
        <text x="15" y="22" class="label" style="font-weight:bold">D</text>
        <text x="15" y="45" class="label">Data/RJ45</text>
    </g>
  </g>

  <g transform="translate(50, 600)">
    <text x="0" y="-15" class="section-title">G. Appareils d'utilisation</text>
    <g id="fluo_simple" transform="translate(0,0)">
        <rect x="0" y="10" width="50" height="10" class="symbol"/>
        <line x1="10" y1="10" x2="10" y2="20" class="symbol"/>
        <line x1="40" y1="10" x2="40" y2="20" class="symbol"/>
        <text x="25" y="35" class="label">Fluo</text>
    </g>
    <g id="baes" transform="translate(80,0)">
        <rect x="0" y="5" width="40" height="20" class="symbol"/>
        <path d="M 10,15 L 30,15 L 25,10 M 30,15 L 25,20" class="symbol" stroke-width="1"/>
        <text x="20" y="40" class="label">Secours</text>
    </g>
    <g id="sonnerie" transform="translate(160,0)">
        <path d="M 0,20 A 15,15 0 0 1 30,20 Z" class="symbol"/>
        <rect x="12" y="20" width="6" height="5" class="symbol"/>
        <text x="15" y="40" class="label">Sonnerie</text>
    </g>
    <g id="chauffe_eau" transform="translate(240,0)">
        <rect x="5" y="0" width="25" height="35" rx="5" class="symbol"/>
        <path d="M 10,25 Q 15,20 20,25" class="symbol"/>
        <text x="17" y="48" class="label">Boiler</text>
    </g>
  </g>

  <g transform="translate(50, 750)">
    <text x="0" y="-15" class="section-title">H &amp; J. Sources et Domotique</text>
    <g id="panneau_solaire" transform="translate(0,0)">
        <rect x="0" y="0" width="40" height="30" class="symbol"/>
        <line x1="0" y1="10" x2="40" y2="10" class="symbol" stroke-width="0.5"/>
        <line x1="0" y1="20" x2="40" y2="20" class="symbol" stroke-width="0.5"/>
        <line x1="13" y1="0" x2="13" y2="30" class="symbol" stroke-width="0.5"/>
        <line x1="26" y1="0" x2="26" y2="30" class="symbol" stroke-width="0.5"/>
        <text x="20" y="45" class="label">PV</text>
    </g>
    <g id="onduleur" transform="translate(80,0)">
        <rect x="0" y="0" width="35" height="35" class="symbol"/>
        <line x1="0" y1="35" x2="35" y2="0" class="symbol"/>
        <text x="8" y="15" class="label">=</text>
        <text x="25" y="30" class="label">~</text>
        <text x="17" y="50" class="label">Onduleur</text>
    </g>
    <g id="unite_centrale" transform="translate(180,0)">
        <rect x="0" y="0" width="40" height="50" class="symbol"/>
        <line x1="0" y1="25" x2="40" y2="25" class="symbol"/>
        <text x="20" y="15" class="label" style="font-size:7px">BUS</text>
        <circle cx="20" cy="37" r="5" class="symbol"/>
        <text x="20" y="65" class="label">Domotique</text>
    </g>
  </g>

  <g transform="translate(50, 950)">
    <text x="0" y="-15" class="section-title" style="fill: #7f8c8d;">Aménagements Maison Courants</text>
    <g id="arch_taque" transform="translate(0,0)">
        <rect x="0" y="0" width="40" height="40" class="arch" stroke-width="2"/>
        <circle cx="12" cy="12" r="6" class="arch"/>
        <circle cx="28" cy="12" r="4" class="arch"/>
        <circle cx="12" cy="28" r="4" class="arch"/>
        <circle cx="28" cy="28" r="7" class="arch"/>
        <text x="20" y="55" class="label">Taque Elec</text>
    </g>
    <g id="arch_frigo" transform="translate(80,0)">
        <rect x="0" y="0" width="35" height="35" class="arch" stroke-width="2"/>
        <line x1="5" y1="5" x2="30" y2="35" class="arch" stroke-width="0.5"/>
        <text x="17" y="17" class="label" style="font-weight:bold; fill:#888">F</text>
        <text x="17" y="55" class="label">Frigo</text>
    </g>
    <g id="arch_baignoire" transform="translate(160,0)">
        <rect x="0" y="0" width="70" height="35" rx="10" class="arch"/>
        <ellipse cx="35" cy="17" rx="30" ry="12" class="arch"/>
        <text x="35" y="55" class="label">Baignoire</text>
    </g>
    <g id="arch_lit" transform="translate(260,0)">
        <rect x="0" y="0" width="60" height="70" class="arch"/>
        <rect x="5" y="5" width="22" height="15" rx="2" class="arch"/>
        <rect x="33" y="5" width="22" height="15" rx="2" class="arch"/>
        <line x1="0" y1="25" x2="60" y2="25" class="arch"/>
        <text x="30" y="85" class="label">Lit Double</text>
    </g>
    <g id="arch_canape" transform="translate(360,0)">
        <path d="M 0,0 L 80,0 L 80,40 L 0,40 Z" class="arch"/>
        <path d="M 10,10 L 70,10 L 70,40 L 10,40 Z" class="arch"/>
        <text x="40" y="55" class="label">Canapé</text>
    </g>
  </g>

</svg>
